<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>İSG Saha Asistanı v0.5.0</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f8f9fa;
            --text: #2c3e50;
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background-color: var(--bg); color: var(--text);
            overflow-x: hidden; touch-action: manipulation;
        }

        .screen { display: none; min-height: 100vh; padding: 20px; padding-top: calc(20px + var(--safe-top)); }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1, h2, h3 { color: var(--primary); margin-top: 0; }

        /* Kart Yapısı */
        .card { 
            background: white; border-radius: 12px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        /* Form Elemanları */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        select, input, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 1rem; transition: border-color 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent); outline: none; }

        /* Butonlar */
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 15px 20px; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s; width: 100%; gap: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }

        /* Konum Grid */
        .location-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }

        /* Chip Listesi */
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip {
            padding: 8px 16px; background: #eee; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; border: 2px solid transparent;
        }
        .chip.active { background: var(--accent); color: white; }

        /* Liste Elemanları */
        .finding-item {
            background: white; border-left: 5px solid var(--accent);
            padding: 15px; margin-bottom: 10px; border-radius: 0 8px 8px 0;
            position: relative;
        }
        .finding-meta { font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        .finding-loc { font-weight: bold; color: var(--primary); }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white; border-radius: 15px; padding: 25px; width: 100%;
            max-width: 400px; text-align: center;
        }

        /* OCR Overlay */
        #camera-ui {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: black; z-index: 2000;
        }
        #video { width:100%; height:100%; object-fit: cover; }
        .cam-controls {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; padding: 0 20px;
        }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .version-badge { font-size: 0.7rem; background: #ddd; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- GİRİŞ / KURULUM EKRANI -->
    <div id="screen-setup" class="screen active">
        <div class="header">
            <h3>İSG Saha Asistanı <span class="version-badge">v0.5.0</span></h3>
            <button class="btn btn-outline" style="width: auto; padding: 8px;" onclick="backupRestore()">
                <i class="fas fa-sync"></i>
            </button>
        </div>

        <div class="card">
            <h2>Yeni Denetim</h2>

            <div class="input-group">
                <label>Kurum</label>
                <div style="display:flex; gap:8px;">
                    <select id="setup-kurum" onchange="birimleriYukle()" style="flex:1">
                        <option value="">Seçiniz...</option>
                    </select>
                    <button class="btn btn-outline" style="width:auto; padding:0 14px;" onclick="yeniKurumEkle()">+</button>
                </div>
            </div>

            <div class="input-group">
                <label>Birim</label>
                <div style="display:flex; gap:8px;">
                    <select id="setup-birim" onchange="updateFloorChipsOrOdaInput()" style="flex:1" disabled>
                        <option value="">Önce kurum seçin</option>
                    </select>
                    <button class="btn btn-outline" style="width:auto; padding:0 14px;" onclick="yeniBirimEkle()">+</button>
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <button class="btn btn-outline" style="font-size:0.8rem;" onclick="exportBirimZip()">
                    <i class="fas fa-file-archive"></i> Birimi Yedekle (ZIP)
                </button>
                <button class="btn btn-outline" style="font-size:0.8rem;" onclick="exportKurumZip()">
                    <i class="fas fa-file-archive"></i> Kurumu Yedekle (ZIP)
                </button>
            </div>

            <div id="kat-secimi" style="display:none">
                <label>Kat Seçin</label>
                <div class="chip-group" id="floor-chips"></div>
            </div>

            <div class="input-group">
                <label>Oda/Alan</label>
                <div style="display:flex; gap:8px;">
                    <select id="setup-oda" style="flex:1">
                        <option value="">Önce birim seçin</option>
                    </select>
                    <button class="btn btn-outline" style="width:auto; padding:0 14px;" onclick="yeniOdaEkle()">+</button>
                </div>
            </div>

            <div class="input-group">
                <label>Sorumlu</label>
                <input type="text" id="setup-responsible" placeholder="Ad Soyad">
            </div>

            <button class="btn btn-primary" onclick="startInspection()">
                <i class="fas fa-play"></i> Denetimi Başlat
            </button>
        </div>

        <div id="active-inspections">
            <h3 style="margin-top:30px">Geçmiş Kayıtlar</h3>
            <div id="inspections-list"></div>

            <button class="btn btn-danger" style="margin-top:20px; opacity: 0.7;" onclick="askDeleteAll()">
                <i class="fas fa-trash-alt"></i> Tüm Veriyi Sıfırla
            </button>
        </div>
    </div>

    <!-- DENETİM EKRANI -->
    <div id="screen-inspection" class="screen">
        <div class="header">
            <button class="btn-outline btn" style="width:auto;" onclick="goToSetup()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div style="text-align:right">
                <div id="current-loc-display" style="font-weight:bold">Bina - Oda</div>
                <div id="session-time" style="font-size:0.8rem; color:#666">00:00</div>
            </div>
        </div>

        <div class="card">
            <h3>Bulgu Ekle</h3>
            <button class="btn btn-primary" onclick="openOCR()" style="margin-bottom:15px; background: #8e44ad;">
                <i class="fas fa-camera"></i> Çek-Onayla (OCR)
            </button>
            <textarea id="finding-manual" placeholder="Bulguyu buraya yazın veya OCR kullanın..." rows="3"></textarea>
            <div class="chip-group" style="margin-top:15px">
                <div class="chip" onclick="addQuickFinding('Yangın Tüpü Eksik')">Tüp Eksik</div>
                <div class="chip" onclick="addQuickFinding('Kablo Dağınıklığı')">Kablo</div>
                <div class="chip" onclick="addQuickFinding('Priz Yerinden Çıkmış')">Priz</div>
            </div>
            <button id="btn-hayati-risk" class="btn" style="margin-top:15px; background:#eee; color:#333;" onclick="toggleHayatiRisk()">
                ⚠ Hayati Risk İşaretle
            </button>
            <button class="btn btn-success" style="margin-top:10px" onclick="saveFinding()">
                <i class="fas fa-plus"></i> Bulguyu Kaydet
            </button>
        </div>

        <h3>Bu Odadaki Bulgular</h3>
        <div id="findings-list"></div>

        <button class="btn btn-outline" style="margin-top:20px" onclick="nextRoom()">
            Sonraki Oda (Otomatik Artır) <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <!-- MODALLAR -->
    <div id="modal-confirm" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Emin misiniz?</h3>
            <p id="modal-text">Bu işlem geri alınamaz.</p>
            <div style="display:flex; gap:10px; margin-top:20px">
                <button class="btn btn-outline" onclick="closeModal()">Vazgeç</button>
                <button id="modal-action-btn" class="btn btn-danger">Evet, Sil</button>
            </div>
        </div>
    </div>

    <!-- OCR UI -->
    <div id="camera-ui">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none"></canvas>
        <div class="cam-controls">
            <button class="btn btn-danger" style="width: auto;" onclick="closeOCR()">İptal</button>
            <button class="btn btn-success" style="width: 80px; height: 80px; border-radius: 50%;" onclick="capturePhoto()">
                <i class="fas fa-camera fa-2x"></i>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
